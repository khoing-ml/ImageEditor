# Inpainting Configuration

guidance_scale: 7.5
inference_steps: 50
num_images: 1

# Model preference
model_id: black-forest-labs/FLUX.1-Fill-dev

# Optimization options
enable_attention_slicing: true

# Mask preparation defaults
mask_preparation:
  enabled: true
  threshold: 127
  opening_kernel: 0
  closing_kernel: 3
  fill_holes: true
  min_component_area: 64
  dilate_kernel: 5
  erode_kernel: 0
  feather_radius: 7
