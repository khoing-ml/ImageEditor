# Interior Design Prompts - Structured Templates for SDXL Dual Prompting

## Design Principles

All templates follow SDXL dual prompting structure:
- **prompt**: Room type, layout, focal objects, spatial composition
- **prompt_2**: Style, materials, lighting, color palette, realism

---

## Living Rooms

### Modern Minimalist

**prompt:**
modern living room, open layout, floor-to-ceiling windows, minimalist furniture, low-profile sofa, geometric coffee table

**prompt_2:**
contemporary minimalist style, light oak and white, natural daylight, neutral beige palette, interior photography, ultra realistic

